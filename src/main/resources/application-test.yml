server:
  port: 30181

spring:
  config:
    activate:
      on-profile: test
  cloud:
    discovery:
      enabled: false
  datasource:
    url: jdbc:h2:mem:sensor_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

eureka:
  client:
    enabled: false

sensor:
  mqtt:
    enabled: false
